<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Elegant dark circle background for high contrast in browser tabs -->
  <circle cx="16" cy="16" r="15" fill="#09090b" stroke="#1f2937" stroke-width="1" />
  
  <!-- Ribbon Bow loops -->
  <path d="M16 10 C12 6, 12 3.5, 15.5 8 Z" fill="#fbbf24" stroke="#fbbf24" stroke-width="0.5" />
  <path d="M16 10 C20 6, 20 3.5, 16.5 8 Z" fill="#fbbf24" stroke="#fbbf24" stroke-width="0.5" />
  <circle cx="16" cy="10" r="1.5" fill="#b45309" />

  <!-- Gift Box Base -->
  <rect x="7" y="14" width="18" height="11" rx="2" fill="#1e1b4b" stroke="#fbbf24" stroke-width="1.2" />
  
  <!-- Lid -->
  <rect x="5" y="10" width="22" height="4" rx="1.2" fill="#fbbf24" stroke="#d97706" stroke-width="0.5" />
  
  <!-- Vertical Gold Ribbon Line on box base -->
  <rect x="14" y="14.6" width="4" height="9.8" fill="#fbbf24" />
</svg>